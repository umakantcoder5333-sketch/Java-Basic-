<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nature Gallery</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<h1>My Nature Gallery</h1>

<!-- FILTER BUTTONS -->
<div class="buttons">
    <button onclick="filterImages('all'); setActive(this)">All</button>
    <button onclick="filterImages('nature'); setActive(this)">Nature</button>
    <button onclick="filterImages('water'); setActive(this)">Water</button>
    <button onclick="filterImages('mountain'); setActive(this)">Mountain</button>
    <button onclick="filterImages('bird'); setActive(this)">Bird</button>
    <button onclick="filterImages('flower'); setActive(this)">Flower</button>
    <button onclick="filterImages('krishna'); setActive(this)">Krishna</button>
</div>

<!-- GALLERY -->
<div class="gallery">
    <img src="image1.jpg" class="nature" onclick="openLightbox(0)">
    <img src="image2.jpg" class="nature water" onclick="openLightbox(1)">
    <img src="image3.jpg" class="nature mountain" onclick="openLightbox(2)">
    <img src="image4.jpg" class="nature sunset" onclick="openLightbox(3)">
    <img src="image5.jpg" class="krishna" onclick="openLightbox(4)">
    <img src="image6.jpg" class="bird" onclick="openLightbox(5)">
    <img src="image7.jpg" class="bird" onclick="openLightbox(6)">
    <img src="image8.jpg" class="flower" onclick="openLightbox(7)">
    
  
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
    <span onclick="closeLightbox()">❌</span>
    <img id="lightbox-img">

    <button class="prev" onclick="prev()">⬅</button>
    <button class="next" onclick="next()">➡</button>
</div>

<script src="script2.js"></script>

</body>
</html>
